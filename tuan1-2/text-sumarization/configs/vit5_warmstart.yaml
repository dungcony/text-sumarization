# =============================================================================
# ViT5 VietNews Warm-Start
# =============================================================================
# Starts from a model already fine-tuned on Vietnamese news summarization,
# then continues fine-tuning on our dataset. Uses lower learning rate
# to avoid catastrophic forgetting.
#
# Model: VietAI/vit5-base-vietnews-summarization (already summarization-tuned)
# Training: Full fine-tuning with conservative LR
# Hardware: Designed for GPU with ≥16GB VRAM
# =============================================================================

model:
  name_or_path: "VietAI/vit5-base-vietnews-summarization"
  use_fast_tokenizer: false
  trust_remote_code: false

data:
  train_file: "../../data/fine-turn/train-00000-of-00001.parquet"
  valid_file: "../../data/fine-turn/valid-00000-of-00001.parquet"
  source_prefix: "summarize: "
  max_source_length: 768
  max_target_length: 160

training:
  output_dir: "outputs/vit5_warmstart"
  seed: 42
  num_train_epochs: 2             # Fewer epochs (model is already trained)
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 2
  learning_rate: 0.00001          # Lower LR (1e-5) to avoid forgetting
  weight_decay: 0.02              # Slightly stronger regularization
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  label_smoothing_factor: 0.1     # More label smoothing
  precision: "auto"
  eval_strategy: "steps"
  eval_steps: 400
  save_strategy: "steps"
  save_steps: 400
  save_total_limit: 2
  logging_steps: 100
  metric_for_best_model: "rougeL"
  greater_is_better: true
  load_best_model_at_end: true
  early_stopping_patience: 5

generation:
  max_length: 200
  min_length: 30
  num_beams: 6                    # More beams for better quality
  length_penalty: 1.0
  no_repeat_ngram_size: 3
  repetition_penalty: 1.05        # Slight repetition penalty
  early_stopping: true

lora:
  enabled: false
