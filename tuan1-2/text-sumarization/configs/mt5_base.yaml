# =============================================================================
# mT5-base (Multilingual T5)
# =============================================================================
# Google's multilingual T5 model. Supports 101 languages including Vietnamese.
# Larger and slower than ViT5, but useful as a multilingual baseline.
#
# Model: google/mt5-base (~580M params)
# Training: Full fine-tuning with Adafactor optimizer (memory-efficient)
# Hardware: Requires GPU with ≥24GB VRAM (or use gradient checkpointing)
# =============================================================================

model:
  name_or_path: "google/mt5-base"
  use_fast_tokenizer: false       # SentencePiece (like ViT5)
  trust_remote_code: false

data:
  train_file: "../../data/fine-turn/train-00000-of-00001.parquet"
  valid_file: "../../data/fine-turn/valid-00000-of-00001.parquet"
  source_prefix: "summarize: "
  max_source_length: 768
  max_target_length: 160

training:
  output_dir: "outputs/mt5_base"
  seed: 42
  num_train_epochs: 3
  per_device_train_batch_size: 2  # Smaller batch (large model)
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4  # Compensate for small batch
  learning_rate: 0.0001           # Adafactor default
  weight_decay: 0.0               # Adafactor handles its own regularization
  warmup_ratio: 0.1
  lr_scheduler_type: "constant"
  optim: "adafactor"              # Memory-efficient optimizer for large models
  label_smoothing_factor: 0.05
  precision: "auto"
  gradient_checkpointing: true    # Save memory for large model
  eval_strategy: "steps"
  eval_steps: 500
  save_strategy: "steps"
  save_steps: 500
  save_total_limit: 2
  logging_steps: 100
  metric_for_best_model: "rougeL"
  greater_is_better: true
  load_best_model_at_end: true
  early_stopping_patience: 5

generation:
  max_length: 200
  min_length: 30
  num_beams: 4
  length_penalty: 1.0
  no_repeat_ngram_size: 3
  repetition_penalty: 1.0
  early_stopping: true

lora:
  enabled: false
