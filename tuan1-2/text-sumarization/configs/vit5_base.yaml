# =============================================================================
# ViT5-base Full Fine-tuning
# =============================================================================
# Best performing model for Vietnamese summarization.
# Achieves ROUGE-L ≈ 0.49 on test set.
#
# Model: VietAI/vit5-base (Vietnamese T5, 223M params)
# Training: Full fine-tuning (all parameters updated)
# Hardware: Designed for GPU with ≥16GB VRAM
# =============================================================================

model:
  name_or_path: "VietAI/vit5-base"
  use_fast_tokenizer: false       # Must be false for ViT5 (SentencePiece)
  trust_remote_code: false

data:
  train_file: "../../data/fine-turn/train-00000-of-00001.parquet"
  valid_file: "../../data/fine-turn/valid-00000-of-00001.parquet"
  source_prefix: "summarize: "    # T5 models expect this prefix
  max_source_length: 768          # Max article length in tokens
  max_target_length: 160          # Max summary length in tokens

training:
  output_dir: "outputs/vit5_base"
  seed: 42
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 2  # Effective batch = 4 * 2 = 8
  learning_rate: 0.00003          # 3e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  label_smoothing_factor: 0.05
  precision: "auto"               # Auto-detect fp16/bf16
  eval_strategy: "steps"
  eval_steps: 500
  save_strategy: "steps"
  save_steps: 500
  save_total_limit: 2
  logging_steps: 100
  metric_for_best_model: "rougeL"
  greater_is_better: true
  load_best_model_at_end: true
  early_stopping_patience: 5

generation:
  max_length: 200
  min_length: 30
  num_beams: 4
  length_penalty: 1.0
  no_repeat_ngram_size: 3
  repetition_penalty: 1.0
  early_stopping: true

lora:
  enabled: false                  # Full fine-tuning (no LoRA)
